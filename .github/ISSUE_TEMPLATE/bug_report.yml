name: Bug report
description: Report a PIDron problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the issue and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Set...\n3. Click..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: PIDron version
      placeholder: "1.2.0"
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows installer
        - Windows portable
        - Ubuntu / Linux
        - Source run
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Screenshots, setup values, logs, or flight-controller text if relevant.
